<script>

  // 🔐 PASSWORD CHECK
  function checkPassword() {
    const entered = document.getElementById("accessPassword").value;
    const correctPassword = "4711"; // CHANGE THIS

    if (entered === correctPassword) {
      document.getElementById("passwordScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
    } else {
      document.getElementById("passwordError").textContent = "Incorrect password";
    }
  }

  let sessionActive = false;
  let html5QrCode = null;
  let lastScan = "";
  let scanCooldown = false;

  let sessionScans = [];
  let instructors = [];

  const beep = new Audio("beep2.mp3");
  beep.load();

  function lockFields() {
    ["trainingTitle","trainingDate","trainingHours","submitterName","submitterStar"]
      .forEach(id => document.getElementById(id).disabled = true);
  }

  function unlockFields() {
    ["trainingTitle","trainingDate","trainingHours","submitterName","submitterStar"]
      .forEach(id => document.getElementById(id).disabled = false);
  }

  window.onload = () => {
    localStorage.removeItem("trainingSession");
  };

  function saveSessionToLocalStorage() {
    const sessionData = {
      trainingTitle: document.getElementById("trainingTitle").value,
      trainingDate: document.getElementById("trainingDate").value,
      trainingHours: document.getElementById("trainingHours").value,
      submitterName: document.getElementById("submitterName").value,
      submitterStar: document.getElementById("submitterStar").value,
      trainingNotes: document.getElementById("trainingNotes").value,
      sessionScans: sessionScans,
      instructors: instructors,
      sessionActive: sessionActive
    };
    localStorage.setItem("trainingSession", JSON.stringify(sessionData));
  }

  // ⭐ SCAN CONFIRMATION POPUP
  function showScanConfirmation(name, starnumber) {
    const box = document.getElementById("scanConfirm");
    box.textContent = `${name} — ${starnumber} added`;
    box.style.display = "block";

    setTimeout(() => {
      box.style.display = "none";
    }, 1500);
  }

  // ⭐ AUTO-SORT ATTENDEES (A → Z by name)
  function sortAttendees() {
    sessionScans.sort((a, b) => a.name.localeCompare(b.name));

    const list = document.getElementById("scanList");
    list.innerHTML = "";

    sessionScans.forEach(s => {
      addScanToList(s.name, s.starnumber);
    });
  }

  // ⭐ ADD ATTENDEE WITH INSTRUCTOR TOGGLE
  function addScanToList(name, starnumber) {
    const list = document.getElementById("scanList");
    const item = document.createElement("li");

    const isInstructor = instructors.some(i => i.starnumber === starnumber);

    item.innerHTML = `
      <span class="attendeeName">${name} — ${starnumber}</span>

      <div style="display:flex; align-items:center; gap:10px;">

        <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
          <span style="font-size:14px;">Instructor</span>

          <label class="switch">
            <input type="checkbox" class="instructorToggle" ${isInstructor ? "checked" : ""}>
            <span class="slider"></span>
          </label>
        </div>

        <button class="removeBtn">Remove</button>
      </div>
    `;

    // Remove attendee
    item.querySelector(".removeBtn").addEventListener("click", () => {
      sessionScans = sessionScans.filter(s => s.starnumber !== starnumber);
      instructors = instructors.filter(i => i.starnumber !== starnumber);
      item.remove();
      updateInstructorSection();
      saveSessionToLocalStorage();
    });

    // Instructor toggle
    item.querySelector(".instructorToggle").addEventListener("change", (e) => {
      if (e.target.checked) {
        if (!instructors.some(i => i.starnumber === starnumber)) {
          instructors.push({ name, starnumber, hours: "" });
        }
      } else {
        instructors = instructors.filter(i => i.starnumber !== starnumber);
      }

      updateInstructorSection();
      saveSessionToLocalStorage();
    });

    list.appendChild(item); // ⭐ changed from prepend → append
  }

  // ⭐ UPDATE INSTRUCTOR LIST
  function updateInstructorSection() {
    const instructorList = document.getElementById("instructorList");
    instructorList.innerHTML = "";

    instructors.forEach((i, index) => {
      instructorList.innerHTML += `
        <li>
          ${i.name} — ${i.starnumber}
          <input type="number" min="0" step="1" 
                value="${i.hours || ""}" 
                placeholder="Hours"
                style="width:70px; margin-left:10px;"
                oninput="updateInstructorHoursValue(${index}, this.value)">
        </li>
      `;
    });
  }

  function updateInstructorHoursValue(index, value) {
    instructors[index].hours = value;
    saveSessionToLocalStorage();
  }

  function showWarning(message) {
    const status = document.getElementById("status");
    status.style.color = "red";
    status.textContent = message;
    setTimeout(() => status.textContent = "", 3000);
  }

  function clearWarning() {
    const status = document.getElementById("status");
    status.textContent = "";
    status.style.color = "black";
  }

  // ⭐ QR SCAN SUCCESS
  function onScanSuccess(decodedText) {
    if (!sessionActive) return;
    if (scanCooldown || decodedText === lastScan) return;

    scanCooldown = true;
    lastScan = decodedText;

    beep.play();

    const cleaned = decodedText.replace(/[|¦｜‖∣]/g, "|");
    const parts = cleaned.split("|").map(p => p.trim());

    const name = parts[0] || "";
    const starnumber = parts[1] || "";
    const division = parts[2] || "";

    if (!name || !starnumber) {
      showWarning("⚠️ Invalid QR code format.");
      setTimeout(() => scanCooldown = false, 2000);
      return;
    }

    if (sessionScans.some(s => s.starnumber === starnumber)) {
      showWarning(`⚠️ Duplicate scan: ${name} (${starnumber})`);
      setTimeout(() => scanCooldown = false, 2000);
      return;
    }

    clearWarning();

    addScanToList(name, starnumber);
    showScanConfirmation(name, starnumber);

    sessionScans.push({ name, starnumber, division });
    saveSessionToLocalStorage();

    sortAttendees();

    setTimeout(() => scanCooldown = false, 2000);
  }

  // ⭐ START SESSION
  document.getElementById("startSessionBtn").addEventListener("click", () => {
    const title = document.getElementById("trainingTitle").value;
    const date = document.getElementById("trainingDate").value;
    const hours = document.getElementById("trainingHours").value;
    const submitterName = document.getElementById("submitterName").value;
    const submitterStar = document.getElementById("submitterStar").value;

    if (!title || !date || !hours || !submitterName || !submitterStar) {
      alert("Please fill out ALL fields before starting the session.");
      return;
    }

    lockFields();
    sessionActive = true;
    saveSessionToLocalStorage();

    document.getElementById("startSessionBtn").style.display = "none";
    document.getElementById("newSessionBtn").style.display = "inline-block";
    document.getElementById("downloadCsvBtn").style.display = "inline-block";
    document.getElementById("reader").style.display = "block";
    document.getElementById("manualEntry").style.display = "block";

    html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      decodedText => onScanSuccess(decodedText)
    );
  });

  // ⭐ MANUAL ENTRY
  document.getElementById("addManualBtn").addEventListener("click", () => {
    const name = document.getElementById("manualName").value.trim();
    const starnumber = document.getElementById("manualStar").value.trim();

    if (!name || !starnumber) {
      alert("Please enter both name and star number.");
      return;
    }

    if (sessionScans.some(s => s.starnumber === starnumber)) {
      alert("This attendee is already recorded.");
      return;
    }

    addScanToList(name, starnumber);
    showScanConfirmation(name, starnumber);

    sessionScans.push({ name, starnumber, division: "Manual Entry" });
    saveSessionToLocalStorage();

    sortAttendees();

    document.getElementById("manualName").value = "";
    document.getElementById("manualStar").value = "";
  });

  // ⭐ DOWNLOAD CSV
  function downloadCSV() {
    if (sessionScans.length === 0) {
      alert("No attendees recorded.");
      return;
    }

    const confirmEnd = confirm(
      "Downloading the CSV will end the current session.\n\nDo you want to continue?"
    );

    if (!confirmEnd) return;

    const title = document.getElementById("trainingTitle").value;
    const date = document.getElementById("trainingDate").value;
    const hours = document.getElementById("trainingHours").value;
    const submitterName = document.getElementById("submitterName").value;
    const submitterStar = document.getElementById("submitterStar").value;

    let csv = "Training Title,Date,Hours,Submitter Name,Submitter Star\n";
    csv += `"${title}","${date}","${hours}","${submitterName}","${submitterStar}"\n\n`;
    
    csv += "Notes\n";
    csv += `"${document.getElementById("trainingNotes").value.replace(/"/g, '""')}"\n\n`;

    csv += "--- INSTRUCTORS ---\n";
    csv += "Name,Star Number,Hours\n";

    instructors.forEach(i => {
      csv += `"${i.name}","${i.starnumber}","${i.hours || ""}"\n`;
    });

    csv += "\n";

    csv += "--- ATTENDEES ---\n";
    csv += "Name,Star Number,Division,Instructor\n";

    sessionScans.forEach(s => {
      const isInstructor = instructors.some(i => i.starnumber === s.starnumber);
      csv += `"${s.name}","${s.starnumber}","${s.division}","${isInstructor ? "YES" : "NO"}"\n`;
    });

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = `Training_Attendance_${date}.csv`;
    link.click();

    URL.revokeObjectURL(url);

    document.getElementById("newSessionBtn").click();
  }

  document.getElementById("downloadCsvBtn").addEventListener("click", downloadCSV);

  // ⭐ NEW SESSION WITH CONFIRMATION
  document.getElementById("newSessionBtn").addEventListener("click", () => {

    const confirmReset = confirm(
      "This will clear all attendees and end the current session.\n\nDo you want to continue?"
    );

    if (!confirmReset) return;

    sessionActive = false;

    unlockFields();
    ["trainingTitle","trainingDate","trainingHours","submitterName","submitterStar"]
      .forEach(id => document.getElementById(id).value = "");
    
    document.getElementById("trainingNotes").value = "";

    document.getElementById("scanList").innerHTML = "";
    document.getElementById("instructorList").innerHTML = "";

    sessionScans = [];
    instructors = [];

    document.getElementById("startSessionBtn").style.display = "inline-block";
    document.getElementById("newSessionBtn").style.display = "none";
    document.getElementById("downloadCsvBtn").style.display = "none";
    document.getElementById("reader").style.display = "none";
    document.getElementById("manualEntry").style.display = "none";

    if (html5QrCode) {
      html5QrCode.stop().catch(() => {});
    }
    html5QrCode = null;

    localStorage.removeItem("trainingSession");
  });

  // ⭐ AUTO-SAVE TRAINING FIELD CHANGES
  ["trainingTitle","trainingDate","trainingHours","submitterName","submitterStar","trainingNotes"]
    .forEach(id => {
      document.getElementById(id).addEventListener("input", saveSessionToLocalStorage);
    });

</script>


</body>
</html>
